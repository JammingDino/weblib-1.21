name: Release

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Increment version
        id: bump_version
        run: |
          python3 -c "
          import os

          file_path = 'gradle.properties'
          new_version = ''

          with open(file_path, 'r') as f:
              lines = f.readlines()

          with open(file_path, 'w') as f:
              for line in lines:
                  if line.strip().startswith('mod_version='):
                      key, value = line.strip().split('=')
                      parts = value.split('.')
                      if len(parts) == 3:
                          parts[2] = str(int(parts[2]) + 1)
                          new_version = '.'.join(parts)
                          f.write(f'{key}={new_version}\n')
                      else:
                          f.write(line)
                  else:
                      f.write(line)

          if new_version:
              with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                  env_file.write(f'NEW_VERSION={new_version}\n')
              print(f'Bumped version to {new_version}')
          else:
              print('Could not find or bump mod_version')
              exit(1)
          "

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate release notes
        run: |
          echo "Automated release for version ${{ env.NEW_VERSION }}." > release_notes.md
          echo "" >> release_notes.md
          echo "**Changelog:**" >> release_notes.md
          echo "${{ github.event.head_commit.message }}" >> release_notes.md

      - name: Publish to Modrinth and CurseForge
        uses: kir-antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}

          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: build/libs/!(*-sources|*-dev).jar

          name: Web Lib v${{ env.NEW_VERSION }}
          changelog-file: release_notes.md

          version: v${{ env.NEW_VERSION }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21

      - name: Commit and push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Web Lib v${{ env.NEW_VERSION }}
          body_path: release_notes.md
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
